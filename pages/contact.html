<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact page</title>
    <link rel="stylesheet" href="../assets/CSS/contact.css"></link>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
   <header class="hero-section">
        <h1>Contact Us</h1>
        <p>Get in Touch with MarketMuse</p>
    </header>
    <h3 class="get">We'd Love to Hear from you </h3>
    <p class="get">Have question or want or learn more? Reach out to us!</p>

    <main class="container">
        <!-- Info & Form Cards -->
        <section class="card">
            <h3>Contact Information</h3>
            <div>
                <p><i class="fas fa-envelope"></i>anuasehebenezer@gmail.com,</p>
            <p><i class="fas fa-phone"></i>683931751</p>
            <p><i class="fas fa-location-dot"></i>Bamenda,Bambili,UBA</p>
            </div>
        </section>

        <section class="card">
            <h3>Send Us a Message</h3>
            <form>
                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">
                <textarea placeholder="Message"
                rows="10"
                        id="message"
                ></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main> 
</body>
</html>
